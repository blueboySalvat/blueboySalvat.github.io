<!DOCTYPE html>
<html>
	<head>
		<meta charset = "utf-8">
		<title>this is a form</title>
	</head>

	
	<body>

	<form action = "https://www.baidu.com" method = "GET">
		<h3>单行文本域/密码域/单选按钮/多选按钮</h3>
		用户名<input type = "text" name ="username"><br/>
		密码<input type = "password" name ="passwd"><br/>
		男<input type = "radio" name = "sex" value = "man" checked>女
		<input type = "radio" name = "sex" value = "man"><br/>
		打电动<input type = "checkbox" name = "hobby" value = "game">
		读书<input type = "checkbox" name = "hobby" value = "read">
		跑步<input type = "checkbox" name = "hobby" value = "runing"><br/>
		
		<hr/>
		
		<h3>input下的butoon</h3>
		<input type = "button" value = "这是一个普通按钮">
		<input type = "submit" value = "这是一个提交按钮">
		<input type = "reset" value = "这是一个重置按钮">

		<hr/>
		<h3
		<input type = "date" value = "date_time">

		<hr/>
		<h3>最新H5标准下的button</h3>
		<button type = "button">普通按钮</button>
		<button type = "submit">提交按钮</button>
		<button type = "reset">重置按钮</button>
		<hr/>

		<h3>这是下拉列表/单选/多选</h3>
		<select	name = "city">
			<option value = "qingdao">青岛</option>
			<option value = "weifang" selected>潍坊</option>
			<option value = "zibo">淄博</option>
			<option value = "jinan">济南</option>
		</select>		
		<select	name = "city_multiple" multiple>
			<option value = "qingdao" selected>青岛</option>
			<option value = "weifang" selected>潍坊</option>
			<option value = "zibo">淄博</option>
			<option value = "jinan">济南</option>
		</select>
	</form>

	</body>
</html>
